# Temporary workflow: fetch an image from Google Drive and commit it to this
# branch. The Claude remote environment cannot reach drive.google.com, so a
# GitHub runner does the download. Delete this file once the image lands.
name: fetch-drive-image

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image from Google Drive and convert to WebP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq webp imagemagick
          curl -fsSL "https://drive.google.com/uc?export=download&id=1-XHA5NbH4NEKat_6ADiHb6apwHXysvfz" -o /tmp/yuwell-screen.png
          file /tmp/yuwell-screen.png
          identify /tmp/yuwell-screen.png
          cwebp -q 82 /tmp/yuwell-screen.png -o public/images/yuwell-y2-features.webp
          cp /tmp/yuwell-screen.png public/images/_preview-yuwell-y2-features.png
          ls -la public/images/yuwell-y2-features.webp public/images/_preview-yuwell-y2-features.png

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/yuwell-y2-features.webp public/images/_preview-yuwell-y2-features.png
          git commit -m "chore: add Yuwell Y2 feature image fetched from Drive"
          git push
